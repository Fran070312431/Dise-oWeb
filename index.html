<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Over Zhousands</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Imagenes/Icono.png" type="image/x-icon">
</head>
<body>

    <header class="main-header">
        <div class="container">

            <!-- Logo -->
            <a href="#inicio" class="logo-link">
                <img src="Imagenes/Logo-OZ.png" alt="Logo Over Zhousands" class="logo-img">
            </a>

            <!-- Nav principal (se oculta en movil) -->
            <nav class="nav">
                <ul>
                    <li><a href="#inicio">INICIO</a></li>
                    <li><a href="#galeria">GALERÍA</a></li>
                    <li><a href="#contacto">CONTÁCTANOS</a></li>
                    <li><a href="#devlogs">DEVLOGS</a></li>
                </ul>
            </nav>

            <!-- iconos redes sociales + Juega Ya + Menu desplegable en el modo movil -->
            <nav class="nav1">
                <ul>
                    <li>
                        <a href="https://youtube.com/@sickgecko-i9h?si=tJvN0iWw6drTwCbJ" class="icon-btn" target="_blank">
                            <img src="Imagenes/Boton_youtube.png" alt="YouTube" class="btn-icon">
                        </a>
                    </li>
                    <li>
                        <a href="https://www.instagram.com/sickgeckostudio/" class="icon-btn" target="_blank">
                            <img src="Imagenes/Boton_instagram.png" alt="Instagram" class="btn-icon">
                        </a>
                    </li>
                    <li>
                        <a href="https://sickgecko.itch.io/over-zhousands" class="play-btn" target="_blank">
                            <img src="Imagenes/Boton_juega.png" alt="Juega Ya" class="play-btn-icon">
                        </a>
                    </li>
                    <li>
                        <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">
                            <img src="Imagenes/Boton_menu.png" alt="Menú" class="menu-btn-icon">
                        </button>
                    </li>
                </ul>
            </nav>

        </div>

        <!-- Menú desplegable mobile -->
        <div class="mobile-menu" id="mobileMenu">
            <a href="#inicio" onclick="cerrarMenu()">INICIO</a>
            <a href="#galeria" onclick="cerrarMenu()">GALERÍA</a>
            <a href="#contacto" onclick="cerrarMenu()">CONTÁCTANOS</a>
            <a href="#devlogs" onclick="cerrarMenu()">DEVLOGS</a>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="content">
        <section class="hero" id="inicio">
            <h1>Bienvenido a Over Zhousands</h1>
        </section>

        <section class="spacer"></section>
    </main>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
        });

        function cerrarMenu() {
            mobileMenu.classList.remove('open');
        }

        document.addEventListener('click', (e) => {
            if (!menuBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                mobileMenu.classList.remove('open');
            }
        });
    </script>

    <!-- FOOTER -->
    <footer class="main-footer">

        <!-- Imagen esquina izquierda -->
        <img src="Imagenes/Humanos_izquierda.png" alt="" class="footer-corner footer-corner--left">

        <!-- Imagen esquina derecha -->
        <img src="Imagenes/Zombi_derecha.png" alt="" class="footer-corner footer-corner--right">

        <!-- Contenido central del footer dividido en 3 columnas -->
        <div class="footer-grid">

            <!-- Columna izquierda: copyright + devlogs -->
            <div class="footer-col footer-col--left">
                <p class="footer-copy">© COPYRIGHT © 2026 <span class="footer-studio">SICKGECKOSTUDIO</span><br>ALL RIGHTS RESERVED</p>
                <ul class="footer-links">
                    <li><a href="#devlogs">• DEVLOGS</a></li>
                </ul>
            </div>

            <!-- Columna central: logo + email -->
            <div class="footer-col footer-col--center">
                <a href="mailto:sickgeckostudio@gmail.com" class="footer-email">Sickgeckostudio<span class="footer-gmail">@gmail.com</span></a>
            </div>

            <!-- Columna derecha: PEGI + redes sociales -->
            <div class="footer-col footer-col--right">
                <a href="https://www.udit.es" class="icon-udit" target="_blank">
                    <img src="imagenes/UDIT.png" class="footer-udit">
                </a>
                <div class="footer-social">
                    <p class="footer-social-label">REDES SOCIALES</p>
                    <div class="footer-social-icons">
                        <a href="https://youtube.com/@sickgecko-i9h?si=tJvN0iWw6drTwCbJ" class="icon-btn" target="_blank">
                            <img src="Imagenes/Boton_youtube.png" alt="YouTube" class="footer-icon">
                        </a>
                        <a href="https://www.instagram.com/sickgeckostudio/" class="icon-btn" target="_blank">
                            <img src="Imagenes/Boton_instagram.png" alt="Instagram" class="footer-icon">
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </footer>

</body>
</html>
