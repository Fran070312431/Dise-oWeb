<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Over Zhousands</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">

            <!-- Logo -->
            <a href="#inicio" class="logo-link">
                <img src="Imagenes/Logo-OZ.png" alt="Logo Over Zhousands" class="logo-img">
            </a>

            <!-- Nav principal (se oculta en movil) -->
            <nav class="nav">
                <ul>
                    <li><a href="#inicio">INICIO</a></li>
                    <li><a href="#galeria">GALERÍA</a></li>
                    <li><a href="#contacto">CONTÁCTANOS</a></li>
                    <li><a href="#devlogs">DEVLOGS</a></li>
                </ul>
            </nav>

            <!-- iconos redes sociales + Juega Ya + Menu desplegable en el modo movil -->
            <nav class="nav1">
                <ul>
                    <!-- YouTube -->
                    <li>
                        <a href="#" class="icon-btn">
                            <img src="Imagenes/Boton_youtube.png" alt="YouTube" class="btn-icon">
                        </a>
                    </li>
                    <!-- Instagram -->
                    <li>
                        <a href="https://www.instagram.com/sickgeckostudio/" class="icon-btn">
                            <img src="Imagenes/Boton_instagram.png" alt="Instagram" class="btn-icon">
                        </a>
                    </li>
                    <!-- Juega Ya -->
                    <li>
                        <a href="https://sickgecko.itch.io/over-zhousands" class="play-btn">
                            <img src="Imagenes/Boton_juega.png" alt="Juega Ya" class="play-btn-icon">
                        </a>
                    </li>
                    <!-- Botón desplegable: solo visible en movil -->
                    <li>
                        <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">
                            <img src="Imagenes/Boton_menu.png" alt="Menú" class="menu-btn-icon">
                        </button>
                    </li>
                </ul>
            </nav>

        </div>

        <!-- Menú desplegable mobile -->
        <div class="mobile-menu" id="mobileMenu">
            <a href="#inicio" onclick="cerrarMenu()">INICIO</a>
            <a href="#galeria" onclick="cerrarMenu()">GALERÍA</a>
            <a href="#contacto" onclick="cerrarMenu()">CONTÁCTANOS</a>
            <a href="#devlogs" onclick="cerrarMenu()">DEVLOGS</a>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="content">
        <section class="hero" id="inicio">
            <h1>Bienvenido a Over Zhousands</h1>
        </section>

        <section class="spacer"></section>
    </main>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
        });

        function cerrarMenu() {
            mobileMenu.classList.remove('open');
        }

        // Cerrar menú al hacer click fuera
        document.addEventListener('click', (e) => {
            if (!menuBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                mobileMenu.classList.remove('open');
            }
        });
    </script>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; COPYRIGHT &copy; 2026 SICKGECKOSTUDIO</p>
            <p>ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
